<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo image Suprajit -->
    <div class="login-logo">
      <img src="/images/logo_suprajit.png" alt="Logo Suprajit">
   </div>

    <div class="login-header">
      <h1>GMAO Intelligente</h1>
      <p>Connectez-vous à votre espace de maintenance</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="form-group">
        <label for="email">
          <span class="label-icon">✉</span> Adresse email
        </label>
        <div class="input-wrapper">
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="vous@suprajit.ma"
            autocomplete="email"
            [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          />
        </div>
        <span class="error-msg"
          *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">
          L'email est requis
        </span>
        <span class="error-msg"
          *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
          Format d'email invalide
        </span>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label for="password">
          <span class="label-icon">🔒</span> Mot de passe
        </label>
        <div class="input-wrapper password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <button type="button" class="eye-btn" (click)="togglePassword()" tabindex="-1">
            <span *ngIf="!showPassword">👁</span>
            <span *ngIf="showPassword">-</span>
          </button>
        </div>
        <span class="error-msg"
          *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Le mot de passe est requis
        </span>
      </div>

      <!-- Erreur globale -->
      <div class="error-banner" *ngIf="errorMessage">
        <span>⚠</span> {{ errorMessage }}
      </div>

      <!-- Bouton -->
      <button type="submit" [disabled]="isLoading" class="btn-login">
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading" class="loader-wrapper">
          <span class="spinner"></span> Connexion en cours...
        </span>
      </button>

    </form>

    <div class="login-footer">
      <p>Suprajit Maroc &copy; {{ currentYear }}</p>
    </div>

  </div>
</div>
