<div class="chat-widget" *ngIf="isLoggedIn">

  <!-- Bouton flottant -->
  <button class="chat-fab" (click)="toggleChat()" [class.chat-fab--open]="isOpen">
    <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <svg *ngIf="isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <!-- Fenêtre de chat -->
  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">
      <span>🤖 Assistant GMAO</span>
    </div>

    <div class="chat-messages" #messagesContainer>
      <div *ngFor="let msg of messages"
           class="chat-message"
           [class.chat-message--user]="msg.role === 'user'"
           [class.chat-message--assistant]="msg.role === 'assistant'">
        <div class="chat-bubble">{{ msg.content }}</div>
      </div>

      <div class="chat-message chat-message--assistant" *ngIf="isSending">
        <div class="chat-bubble chat-bubble--loading">
          <span class="spinner"></span> En train de réfléchir...
        </div>
      </div>

      <div class="chat-message chat-message--error" *ngIf="hasError">
        <div class="chat-bubble chat-bubble--error">
          Analyse indisponible, réessayez plus tard.
          <button class="btn-retry-chat" (click)="retryLastMessage()">Réessayer</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text"
             [(ngModel)]="currentInput"
             (keyup.enter)="sendMessage()"
             placeholder="Posez votre question..."
             [disabled]="isSending" />
      <button (click)="sendMessage()" [disabled]="isSending || !currentInput.trim()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>
