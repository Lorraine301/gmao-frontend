<div class="page-wrapper">
  <div class="page-header">
    <button class="btn-back" routerLink="/users">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Retour
    </button>
    <h1 class="page-title">{{ isEditMode ? 'Modifier' : 'Ajouter' }} un utilisateur</h1>
  </div>

  <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Code employé <span class="required">*</span></label>
        <input type="text" formControlName="employeeCode" placeholder="ex: 317" />
      </div>
      <div class="form-group">
        <label>Rôle <span class="required">*</span></label>
        <select formControlName="roleName">
          <option value="Admin">Admin</option>
          <option value="Supervisor">Superviseur</option>
          <option value="Technician">Technicien</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Nom complet <span class="required">*</span></label>
      <input type="text" formControlName="fullName" />
    </div>

    <div class="form-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" formControlName="email" />
    </div>

    <div class="form-group">
      <label>Mot de passe <span class="required" *ngIf="!isEditMode">*</span></label>
      <input type="password" formControlName="password"
             [placeholder]="isEditMode ? 'Laisser vide pour ne pas changer' : ''" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Spécialité</label>
        <select formControlName="speciality">
          <option value="">—</option>
          <option value="Mécanique">Mécanique</option>
          <option value="Électrique">Électrique</option>
          <option value="Électromécanique">Électromécanique</option>
        </select>
      </div>
      <div class="form-group">
        <label>Disponibilité</label>
        <select formControlName="availabilityStatus">
          <option value="Available">Disponible</option>
          <option value="Busy">Occupé</option>
          <option value="Unavailable">Indisponible</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-ghost" routerLink="/users">Annuler</button>
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">{{ isEditMode ? 'Enregistrer' : 'Créer' }}</span>
        <span *ngIf="isSubmitting" class="btn-loading"><span class="spinner"></span> Envoi...</span>
      </button>
    </div>
  </form>
</div>
